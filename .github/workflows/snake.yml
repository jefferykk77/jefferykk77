name: Generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Download GitHub Stats Cards
        run: |
          mkdir -p dist
          curl -sLo dist/github-stats.svg "https://github-stats-extended.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true"
          curl -sLo dist/github-top-langs.svg "https://github-stats-extended.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=radical"
          curl -sLo dist/github-streak.svg "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&theme=radical"

      - name: Publish generated SVGs
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
